name: Vercel

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check Vercel Secrets
        id: preflight
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (Missing Secrets)
        if: steps.preflight.outputs.configured != 'true'
        run: echo "Skipping Vercel preview deploy. Configure VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID."

      - name: Checkout
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.preflight.outputs.configured == 'true'
        run: npm ci

      - name: Ensure Linux optional native deps
        if: steps.preflight.outputs.configured == 'true'
        run: |
          mapfile -t LINUX_OPTIONAL_PKGS < <(
            node -e "const lock=require('./package-lock.json');const out=[];for(const pkg of Object.values(lock.packages||{})){for(const [name,version] of Object.entries(pkg.optionalDependencies||{})){if(name.endsWith('-linux-x64-gnu'))out.push(name+'@'+version)}};console.log([...new Set(out)].join('\n'));"
          )
          if [ "${#LINUX_OPTIONAL_PKGS[@]}" -gt 0 ]; then
            npm install --no-save "${LINUX_OPTIONAL_PKGS[@]}"
          fi

      - name: Pull Vercel Environment (Preview)
        if: steps.preflight.outputs.configured == 'true'
        run: npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build Preview Artifacts
        if: steps.preflight.outputs.configured == 'true'
        run: npx vercel build --token=$VERCEL_TOKEN

      - name: Deploy Preview
        if: steps.preflight.outputs.configured == 'true'
        run: npx vercel deploy --prebuilt --token=$VERCEL_TOKEN

  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check Vercel Secrets
        id: preflight
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (Missing Secrets)
        if: steps.preflight.outputs.configured != 'true'
        run: echo "Skipping Vercel production deploy. Configure VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID."

      - name: Checkout
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.preflight.outputs.configured == 'true'
        run: npm ci

      - name: Ensure Linux optional native deps
        if: steps.preflight.outputs.configured == 'true'
        run: |
          mapfile -t LINUX_OPTIONAL_PKGS < <(
            node -e "const lock=require('./package-lock.json');const out=[];for(const pkg of Object.values(lock.packages||{})){for(const [name,version] of Object.entries(pkg.optionalDependencies||{})){if(name.endsWith('-linux-x64-gnu'))out.push(name+'@'+version)}};console.log([...new Set(out)].join('\n'));"
          )
          if [ "${#LINUX_OPTIONAL_PKGS[@]}" -gt 0 ]; then
            npm install --no-save "${LINUX_OPTIONAL_PKGS[@]}"
          fi

      - name: Pull Vercel Environment (Production)
        if: steps.preflight.outputs.configured == 'true'
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build Production Artifacts
        if: steps.preflight.outputs.configured == 'true'
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy Production
        if: steps.preflight.outputs.configured == 'true'
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
