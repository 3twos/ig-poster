name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure lightningcss Linux binary
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('lightningcss/package.json').version")
          npm install --no-save "lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}"

      - name: Check DB migrations
        run: npm run db:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build
