name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Ensure Linux optional native deps
        run: |
          mapfile -t LINUX_OPTIONAL_PKGS < <(
            node -e "const lock=require('./package-lock.json');const out=[];for(const pkg of Object.values(lock.packages||{})){for(const [name,version] of Object.entries(pkg.optionalDependencies||{})){if(name.endsWith('-linux-x64-gnu'))out.push(name+'@'+version)}};console.log([...new Set(out)].join('\n'));"
          )
          if [ "${#LINUX_OPTIONAL_PKGS[@]}" -gt 0 ]; then
            npm install --no-save "${LINUX_OPTIONAL_PKGS[@]}"
          fi
      - run: npm run test:coverage

  db-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run db:check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Ensure Linux optional native deps
        run: |
          mapfile -t LINUX_OPTIONAL_PKGS < <(
            node -e "const lock=require('./package-lock.json');const out=[];for(const pkg of Object.values(lock.packages||{})){for(const [name,version] of Object.entries(pkg.optionalDependencies||{})){if(name.endsWith('-linux-x64-gnu'))out.push(name+'@'+version)}};console.log([...new Set(out)].join('\n'));"
          )
          if [ "${#LINUX_OPTIONAL_PKGS[@]}" -gt 0 ]; then
            npm install --no-save "${LINUX_OPTIONAL_PKGS[@]}"
          fi
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'postcss.config.*', 'tailwind.config.*', 'public/**', 'src/**') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'postcss.config.*', 'tailwind.config.*') }}-
      - run: npm run build

  # Merge gate — matches the required status check name
  lint-and-build:
    if: always()
    needs: [lint, typecheck, test, db-check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.db-check.result }}" != "success" ||
                "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
