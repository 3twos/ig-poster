name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ensure Linux optional native deps
        run: |
          mapfile -t LINUX_OPTIONAL_PKGS < <(
            node -e "const lock=require('./package-lock.json');const out=[];for(const pkg of Object.values(lock.packages||{})){for(const [name,version] of Object.entries(pkg.optionalDependencies||{})){if(name.endsWith('-linux-x64-gnu'))out.push(name+'@'+version)}};console.log([...new Set(out)].join('\n'));"
          )
          if [ "${#LINUX_OPTIONAL_PKGS[@]}" -gt 0 ]; then
            npm install --no-save "${LINUX_OPTIONAL_PKGS[@]}"
          fi

      - name: Check DB migrations
        run: npm run db:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build
